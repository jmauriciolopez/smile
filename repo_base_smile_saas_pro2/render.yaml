services:
  - type: web
    name: smile-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smile-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000

  - type: web
    name: smile-vision
    env: docker
    dockerContext: ./vision-service
    dockerfilePath: ./vision-service/Dockerfile
    plan: free # Cambiar a pro para producción real (más RAM)
    region: ohio
    envVars:
      - key: PORT
        value: 8000

databases:
  - name: smile-db
    plan: free
    region: ohio
